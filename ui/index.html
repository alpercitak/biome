<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biome</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="./src/styles/global.css" />
  <script src="./src/main.ts" type="module"></script>
</head>
<body>
  <div id="b-topleft">Biome</div>
  <div id="b-topright">
    <span id="b-source"></span>
    |
    <span id="b-mode"></span>
  </div>
  <div id="b-hud">
    <div id="b-signals">
      <div class="b-signal">
        <div class="b-signal__label">atmosphere</div>
        <div class="b-signal__bar"><div class="b-signal__fill" id="b-signal-fill-atmosphere"></div></div>
        <div class="b-signal__value" id="b-signal-value-atmosphere"></div>
      </div>
      <div class="b-signal">
        <div class="b-signal__label">pulse</div>
        <div class="b-signal__bar"><div class="b-signal__fill" id="b-signal-fill-pulse"></div></div>
        <div class="b-signal__value" id="b-signal-value-pulse"></div>
      </div>
      <div class="b-signal">
        <div class="b-signal__label">ocean</div>
        <div class="b-signal__bar"><div class="b-signal__fill" id="b-signal-fill-ocean"></div></div>
        <div class="b-signal__value" id="b-signal-value-ocean"></div>
      </div>
      <div class="b-signal">
        <div class="b-signal__label">thermals</div>
        <div class="b-signal__bar"><div class="b-signal__fill" id="b-signal-fill-thermals"></div></div>
        <div class="b-signal__value" id="b-signal-value-thermals"></div>
      </div>
      <div class="b-signal">
        <div class="b-signal__label">wind</div>
        <div class="b-signal__bar"><div class="b-signal__fill" id="b-signal-fill-wind"></div></div>
        <div class="b-signal__value" id="b-signal-value-wind"></div>
      </div>
      <div class="b-signal">
        <div class="b-signal__label">migration</div>
        <div class="b-signal__bar"><div class="b-signal__fill" id="b-signal-fill-migration"></div></div>
        <div class="b-signal__value" id="b-signal-value-migration"></div>
      </div>
    </div>
  </div>
  <div id="b-cursor"></div>
  <canvas id="b-canvas"></canvas>
</body>
</html>
